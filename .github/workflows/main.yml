name: Build Nexus APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Nexus-Android

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 关键修正：让 action 自动安装最新的 LTS NDK 和 SDK
      # 它会自动满足 externalNativeBuild 的需求
      - name: Setup Android Environment
        uses: android-actions/setup-android@v3

      # 显式安装你 build.gradle.kts 中指定的 CMake 3.22.1
      - name: Install CMake
        run: sdkmanager "cmake;3.22.1"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            Nexus-Android/.gradle
          key: gradle-${{ hashFiles('Nexus-Android/**/*.gradle*', 'Nexus-Android/gradle/libs.versions.toml') }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 移除了 env 里的 ANDROID_NDK_HOME，让 Gradle 自己去找
      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Nexus-Debug-APK
          path: Nexus-Android/app/build/outputs/apk/debug/app-debug.apk
