name: Build Nexus Debug APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.2

      - name: Remove Aliyun mirror for CI
        working-directory: Nexus-Android
        run: |
          sed -i '/maven.aliyun.com/d' settings.gradle.kts

      - name: Install Android SDK Commandline Tools
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-14742923_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip -d $HOME/android-sdk/cmdline-tools
          mv $HOME/android-sdk/cmdline-tools/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          rm cmdline-tools.zip

      - name: Set Android SDK Environment Variables
        run: |
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1
          sdkmanager "ndk;25.1.8937393" "cmake;3.22.1" "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('Nexus-Android/**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Diagnose build environment
        working-directory: Nexus-Android
        run: |
          echo "=== Working directory ==="
          pwd
          echo ""
          echo "=== Files in directory ==="
          ls -la
          echo ""
          echo "=== Gradle version ==="
          gradle --version
          echo ""
          echo "=== Java version ==="
          java -version
          echo ""
          echo "=== ANDROID_HOME ==="
          echo $ANDROID_HOME
          echo ""
          echo "=== SDK contents ==="
          ls -la $ANDROID_HOME || true

      - name: Build Debug APK
        working-directory: Nexus-Android
        run: |
          set +e
          export GRADLE_OPTS="-Xmx4g -XX:MaxMetaspaceSize=1g"
          gradle assembleDebug --stacktrace --info 2>&1 | tee build.log
          EXIT_CODE=${PIPESTATUS[0]}
          echo ""
          echo "=== Build exit code: $EXIT_CODE ==="
          echo ""
          echo "=== Build log size ==="
          wc -l build.log
          echo ""
          if [ $EXIT_CODE -ne 0 ]; then
            echo ""
            echo "==================== FULL BUILD LOG ===================="
            echo ""
            cat build.log
            echo ""
            echo "==================== KOTLIN ERRORS ===================="
            echo ""
            grep -n "e: " build.log || echo "No 'e: ' errors found"
            echo ""
            echo "==================== COMPILE ERRORS ===================="
            echo ""
            grep -ni "error" build.log | head -100 || echo "No 'error' found"
            echo ""
            echo "==================== TASK FAILED ===================="
            echo ""
            grep -ni "FAILED" build.log || echo "No 'FAILED' found"
            echo "::error::Build failed with exit code $EXIT_CODE"
          fi
          exit $EXIT_CODE

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: Nexus-Android/build.log

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nexus-Debug-APK
          path: Nexus-Android/app/build/outputs/apk/debug/app-debug.apk
