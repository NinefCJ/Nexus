name: Build Nexus Debug APK

# 触发条件：推送代码到 main 分支，或手动在手机上触发
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    # 使用 latest 以获取最快的 runner 分配速度
    runs-on: ubuntu-latest
    
    # 关键：解决 Node.js 兼容性问题
    env:
      NODE_OPTIONS: --openssl-legacy-provider

    steps:
      # 1. 拉取代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 设置 JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. 设置 Android SDK 和 NDK 环境
      - name: Setup Android Environment
        uses: android-actions/setup-android@v3

      # 4. 安装特定的 CMake 版本 (3.22.1)
      - name: Install CMake
        run: sdkmanager "cmake;3.22.1"

      # 5. 缓存 Gradle 依赖
      - name: Cache Gradle packages
        uses: actions/cache@v4.2.0
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            Nexus-Android/.gradle
          key: gradle-${{ hashFiles('Nexus-Android/**/*.gradle*', 'Nexus-Android/gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-

      # 6. 赋予 gradlew 执行权限 (关键修复：显式指定 working-directory)
      - name: Grant execute permission for gradlew
        working-directory: Nexus-Android # 👈 确保在这里找 gradlew
        run: chmod +x gradlew

      # 7. 核心构建命令 (关键修复：显式指定 working-directory)
      - name: Build with Gradle
        working-directory: Nexus-Android # 👈 确保在这里执行 gradle 命令
        run: ./gradlew :app:assembleDebug --stacktrace

      # 8. 上传产物
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Nexus-Debug-APK
          path: Nexus-Android/app/build/outputs/apk/debug/app-debug.apk

      # 9. 清理旧缓存
      - name: Cleanup old caches
        if: always()
        run: |
          echo "Cleaning up old caches..."
          gh cache list --limit 100 --json id --jq '.[].id' | xargs -I {} gh cache delete {} || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
