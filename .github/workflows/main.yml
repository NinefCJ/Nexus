name: Build Nexus Debug APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - uses: actions/checkout@v3

      # 2. 设置 JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # ==========================================
      # 👇👇👇 核心修复区域 👇👇👇
      # 使用命令行手动安装，避开容易报错的自动安装
      # ==========================================
      
      # 2.1 创建工作目录并下载命令行工具
      - name: Install SDK Commandline Tools
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools/latest
          # 下载官方命令行工具 (11.0 版本最稳定)
          wget https://dl.google.com/android/repository/commandlinetools-linux-11076758_latest.zip -O cmdline-tools.zip
          # 解压到 latest 文件夹 (注意：必须是 latest 这个子目录)
          unzip cmdline-tools.zip -d $HOME/android-sdk/cmdline-tools/latest
          rm cmdline-tools.zip

      # 2.2 设置环境变量
      - name: Set Environment Variables
        run: echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV

      # 2.3 手动安装 NDK、CMake 和构建工具 (根据你的项目需求指定版本)
      - name: Install NDK and CMake
        run: |
          export PATH="$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin"
          # 接受许可协议
          yes | sdkmanager --licenses
          # 安装 NDK (对应你之前的报错版本)、CMake 和平台工具
          sdkmanager "ndk;25.1.8937393" "cmake;3.22.1" "platform-tools" "platforms;android-33" "build-tools;33.0.0"

      # ==========================================
      # 👆👆👆 核心修复区域结束 👆👆👆
      # ==========================================

      # 3. 赋予 gradlew 权限
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # 4. 构建 APK
      - name: Build with Gradle
        run: ./gradlew :app:assembleDebug --stacktrace

      # 5. 上传产物
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: Nexus-Debug-APK
          path: Nexus-Android/app/build/outputs/apk/debug/app-debug.apk
